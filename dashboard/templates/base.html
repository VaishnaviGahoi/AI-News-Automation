<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}AI News Automation{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #080c14;
    --surface:   #0f1623;
    --border:    #1a2235;
    --card:      #111827;
    --card-h:    #161f31;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --accent:    #38bdf8;
    --accent2:   #818cf8;
    --green:     #22c55e;
    --red:       #ef4444;
    --yellow:    #f59e0b;
    --font-h:    'Syne', sans-serif;
    --font-b:    'DM Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-b);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(56,189,248,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(129,140,248,0.05) 0%, transparent 50%);
  }

  /* ── Nav ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8,12,20,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px;
  }
  .nav-brand {
    font-family: var(--font-h);
    font-weight: 800; font-size: 18px;
    color: var(--accent); letter-spacing: -0.5px;
    text-decoration: none;
  }
  .nav-brand span { color: var(--text); }
  .nav-links { display: flex; gap: 6px; }
  .nav-links a {
    color: var(--muted); text-decoration: none;
    padding: 6px 14px; border-radius: 8px;
    font-size: 14px; font-weight: 500;
    transition: all 0.2s;
  }
  .nav-links a:hover, .nav-links a.active {
    color: var(--text); background: var(--border);
  }
  .nav-run {
    background: var(--accent); color: #000 !important;
    font-weight: 600 !important;
    padding: 7px 16px !important;
  }
  .nav-run:hover { background: #7dd3fc !important; }

  /* ── Layout ── */
  .page { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

  /* ── Cards ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    transition: border-color 0.2s, transform 0.2s;
  }
  .card:hover { border-color: #2a3a55; transform: translateY(-1px); }

  /* ── Badges ── */
  .badge {
    display: inline-block; font-size: 11px; font-weight: 700;
    padding: 3px 9px; border-radius: 20px;
  }
  .badge-pos  { background: rgba(34,197,94,0.15);  color: var(--green); }
  .badge-neg  { background: rgba(239,68,68,0.15);  color: var(--red);   }
  .badge-neu  { background: rgba(100,116,139,0.15); color: var(--muted);}
  .badge-cat  { background: rgba(56,189,248,0.12);  color: var(--accent);}

  /* ── Score stars ── */
  .score { color: var(--yellow); font-size: 12px; font-weight: 600; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px; border-radius: 9px;
    font-size: 14px; font-weight: 600;
    border: none; cursor: pointer; transition: all 0.2s;
    font-family: var(--font-b);
    text-decoration: none;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #7dd3fc; }
  .btn-ghost { background: var(--border); color: var(--text); }
  .btn-ghost:hover { background: #1e2d45; }

  /* ── Form inputs ── */
  select, input[type=range], input[type=number] {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: var(--font-b);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  select:focus, input:focus { border-color: var(--accent); }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 28px; right: 28px; z-index: 999;
    background: var(--green); color: #000;
    padding: 12px 20px; border-radius: 10px;
    font-weight: 600; font-size: 14px;
    opacity: 0; transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* ── Section heading ── */
  .section-title {
    font-family: var(--font-h);
    font-weight: 700; font-size: 22px;
    margin-bottom: 16px;
    letter-spacing: -0.5px;
  }
  .section-title span { color: var(--accent); }

  /* ── Divider ── */
  hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
{% block head %}{% endblock %}
</head>
<body>

<nav>
  <a class="nav-brand" href="/">📡 AI News <span>Automation</span></a>
  <div class="nav-links">
    <a href="/" class="{% if request.path=='/' %}active{% endif %}">Dashboard</a>
    <a href="/news" class="{% if request.path=='/news' %}active{% endif %}">Browse News</a>
    <a href="/preferences" class="{% if request.path=='/preferences' %}active{% endif %}">Preferences</a>
    <a href="/api/news" target="_blank">API</a>
    <a href="#" class="nav-run" id="runBtn">▶ Run Now</a>
  </div>
</nav>

<div id="toast">✓ Pipeline started!</div>

{% block content %}{% endblock %}

<script>
document.getElementById('runBtn').addEventListener('click', async (e) => {
  e.preventDefault();
  const btn = e.target;
  btn.textContent = '⏳ Running...';
  btn.style.background = '#f59e0b';
  try {
    const r = await fetch('/run-pipeline', {method:'POST'});
    const d = await r.json();
    const toast = document.getElementById('toast');
    toast.textContent = '✓ ' + d.message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);
  } catch(err) {
    alert('Error: ' + err);
  }
  setTimeout(() => { btn.textContent = '▶ Run Now'; btn.style.background = ''; }, 2000);
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>
